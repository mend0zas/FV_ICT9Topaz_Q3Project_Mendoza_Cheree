<html lang="en">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('file:///C:/Users/chere/Downloads/686da8b1c758d1b0b0b51511acda3663%20(1).png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: rgba(26, 26, 26, 0.9);
            border-bottom: 1px solid #dc3545;
            padding: 10px 20px;
        }

        .registration-card {
            background-color: rgba(45, 45, 45, 0.9);
            margin: 40px auto;
            padding: 40px;
            border-radius: 40px;
            width: 85%;
            max-width: 800px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        .img-container {
            width: 200px;
            height: 200px;
            background-color: #333;
            border: 3px solid #dc3545;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #profilePrevieww { width: 100%; height: 100%; object-fit: cover; display: none; }

        label { color: #dc3545; display: block; margin-top: 15px; font-weight: bold; }
        input {
            width: 100%; padding: 10px; border: none; background-color: #222;
            color: white; border-radius: 8px; border: 1px solid #444;
        }

        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 10px; margin-top: 15px; font-weight: bold; }
        .btn-upload { background-color: #666; color: white; }
        .btn-create { background-color: #dc3545; color: white; }

        footer {
            background-color: rgba(26, 26, 26, 0.9);
            color: #aaa;
            padding: 15px;
            text-align: center;
            margin-top: auto;
            font-size: 0.9rem;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand text-danger fw-bold" href="Fairview_ICT9Topaz_Q3Project_Mendoza_Cheree.html">
                <img src="https://play-lh.googleusercontent.com/WzLiOFFxL6Dsob5WXkayg7NpftrcflwODw13ik1fr8ZPZi5rGSWz-bbWgMeOmihNB9BnwrBbYcnZLIsYYCBZPvw=w240-h480-rw" width="40" alt="Logo">
                Fare-ness!
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="Fairview_ICT9Topaz_Q3Project_Mendoza_Cheree.html">Home</a>
                    <a class="nav-link" href="Fairview_ICT9Topaz_Q3Project_Mendoza_Cheree.html">Fare Matrix</a>
                    <a class="nav-link" href="#">Schedule</a>
                    <a class="nav-link" href="#">Help</a>
                </div>
                <div class="d-flex align-items-center">
                    <a href="page2.html (registration page).html" class="btn btn-danger rounded-pill px-4">Create Account</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="registration-card">
        <h1 style="text-align:center; color:#dc3545; font-weight: bold;">Registration</h1>
        <div class="row">
            <div class="col-md-5 text-center">
                <div class="img-container"><img id="profilePrevieww" src="#" alt="Preview" /></div>
                <input type="file" id="fileInputtt" accept="image/*" class="form-control bg-dark text-white border-secondary mb-2">
                <button class="btn-action btn-upload" onclick="uploadImagee()">Upload Preview</button>
            </div>
            <div class="col-md-7">
                <div class="row">
                    <div class="col-6"><label>First Name</label><input type="text" id="firstnameee"></div>
                    <div class="col-6"><label>Last Name</label><input type="text" id="lastnameee"></div>
                </div>
                <div class="row">
                    <div class="col-4"><label>Age</label><input type="number" id="ageee"></div>
                    <div class="col-8"><label>Contact</label><input type="text" id="contacttt"></div>
                </div>
                <label>Password</label><input type="password" id="passworddd">
                <div class="mt-3"><input type="checkbox" id="termsss" style="width:auto;"> I accept the Terms</div>
                <button class="btn-action btn-create" onclick="finishhReg()">Create my account</button>
            </div>
        </div>
    </div>

    <footer>
        Cheree Mendoza - Bianca Zoey Ledres - Elise Ramos | 9-Topaz <br>
        Source: <a href="https://www.metrolinemap.com/metro/manila/" class="text-secondary">metrolinemap.com</a>
    </footer>

    <script>
        function uploadImagee() {
            const fileInput = document.getElementById('fileInputtt');
            const preview = document.getElementById('profilePrevieww');
            if (fileInput.files && fileInput.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) { preview.src = e.target.result; preview.style.display = "block"; }
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        function finishhReg() {
            var name = document.getElementById("firstnameee").value;
            var checked = document.getElementById("termsss").checked;
            if (name !== "" && checked) {
                alert("Success! Welcome, " + name);
                window.location.href = "page3.html (confirmation page).html";
            } else { alert("Complete form properly."); }
        }
    </script>

</body>
