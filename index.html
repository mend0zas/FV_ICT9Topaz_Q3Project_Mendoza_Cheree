<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3Q Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('file:///C:/Users/chere/Downloads/686da8b1c758d1b0b0b51511acda3663%20(1).png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: rgba(26, 26, 26, 0.9);
            border-bottom: 1px solid #dc3545;
            padding: 10px 20px;
        }

        .content-container {
            background-color: rgba(45, 45, 45, 0.9);
            width: 90%;
            max-width: 800px;
            margin: auto;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        #welcome-section h1 { color: #ff4d4d; font-size: 5.5rem; font-weight: bold; }
        #welcome-section h2 { font-style: italic; font-size: 2rem; }
        .matrix-link { color: #ffc107; text-decoration: none; font-weight: bold; cursor: pointer; }

        #matrix-section { display: none; } 
        .fare-display {
            background-color: white;
            color: #dc3545;
            padding: 20px;
            border-radius: 15px;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px 0;
        }

        select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
        label { font-weight: bold; margin-top: 10px; display: block; color: #ffc107; }

        footer {
            background-color: rgba(26, 26, 26, 0.9);
            color: #aaa;
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand text-danger fw-bold" href="#" onclick="showWelcome()">
                <img src="https://play-lh.googleusercontent.com/WzLiOFFxL6Dsob5WXkayg7NpftrcflwODw13ik1fr8ZPZi5rGSWz-bbWgMeOmihNB9BnwrBbYcnZLIsYYCBZPvw=w240-h480-rw" width="40" alt="Logo">
                Fare-ness!
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="#" onclick="showWelcome()">Home</a>
                    <a class="nav-link" href="#" onclick="showMatrix()">Fare Matrix</a>
                    <a class="nav-link" href="#">Schedule</a>
                    <a class="nav-link" href="#">Help</a>
                </div>
                <div class="d-flex align-items-center">
                    <a href="page2.html (registration page).html" class="btn btn-danger rounded-pill px-4">Create Account</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="content-container">
        <div id="welcome-section">
            <h1>Ready to Ride?</h1>
            <p>We are Fare-ness! <span class="matrix-link" onclick="showMatrix()">Click here to open Fare Matrix</span></p>
        </div>

        <div id="matrix-section">
            <h2 class="text-danger fw-bold">Fare Matrix</h2>

            <label>Pick-Up Location</label>
            <select id="pickup">
                <option value="-1">Select Station</option>
                <option value="0">Baclaran</option>
                <option value="4">EDSA</option>
                <option value="7">Vito Cruz</option>
                <option value="10">Central Terminal</option>
                <option value="12">Carriedo</option>
                <option value="15">Blumentritt</option>
                <option value="20">Roosevelt</option>
            </select>


            <label>Drop-Off Location</label>
            <select id="dropoff">
                <option value="-1">Select Station</option>
                <option value="0">Baclaran</option>
                <option value="4">EDSA</option>
                <option value="7">Vito Cruz</option>
                <option value="10">Central Terminal</option>
                <option value="12">Carriedo</option>
                <option value="15">Blumentritt</option>
                <option value="20">Roosevelt</option>
            </select>

            <div class="d-flex gap-2 mt-3">
                <button onclick="calculateFare(false)" class="btn btn-danger w-50 p-2">Regular Fee</button>
                <button onclick="calculateFare(true)" class="btn btn-warning w-50 p-2 text-dark fw-bold">Discounted Fee</button>
            </div>

            <div id="DisplayAns" class="fare-display">₱ 0.00</div>
        </div>
    </div>

    <footer>
        Cheree Mendoza - Bianca Zoey Ledres - Elise Ramos | 9-Topaz<br>
        Source: <a href="https://www.metrolinemap.com/metro/manila/" class="text-secondary">metrolinemap.com</a>
    </footer>

    <script>
        function showMatrix() {
            document.getElementById("welcome-section").style.display = "none";
            document.getElementById("matrix-section").style.display = "block";
        }
        function showWelcome() {
            document.getElementById("welcome-section").style.display = "block";
            document.getElementById("matrix-section").style.display = "none";
        }

        function calculateFare(isDiscounted) {
            let pickup = parseFloat(document.getElementById("pickup").value);
            let dropoff = parseFloat(document.getElementById("dropoff").value);
            let basefare = 50; 
            let perKMrate = 15;
            let baseKM = 2;

            if (pickup === -1 || dropoff === -1) {
                document.getElementById("DisplayAns").innerHTML = "Select Stations";
                return;
            }

            let distance = Math.abs(dropoff - pickup);
            let extraKM = Math.max(distance - baseKM, 0);
            let fare = basefare + (extraKM * perKMrate);

            if (isDiscounted) { fare = fare * 0.8; }

            document.getElementById("DisplayAns").innerHTML = "₱ " + fare.toFixed(2);
        }
    </script>
</body>
</html>
